name: auto-release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      bump:
        description: "Optional version bump override"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

concurrency:
  group: auto-release-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  prepare-release:
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.prepare.outputs.release_created }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Prepare release tag
        id: prepare
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUT_BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          base_sha="$(git rev-parse HEAD)"
          current_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          current_tag="v${current_version}"
          latest_tag="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"

          if [[ -n "${latest_tag}" ]]; then
            commit_count="$(git rev-list --count "${latest_tag}..HEAD")"
            if [[ "${commit_count}" -eq 0 ]]; then
              echo "No unreleased commits since ${latest_tag}; skipping."
              echo "release_created=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          release_tag="${current_tag}"
          if [[ -n "${latest_tag}" ]] && git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            commit_messages="$(git log --format=%B "${latest_tag}..HEAD")"
            bump="${INPUT_BUMP:-auto}"

            if [[ "${bump}" == "auto" ]]; then
              if printf '%s\n' "${commit_messages}" | grep -Eqi '(^|\n)(BREAKING CHANGE:|\[[[:space:]]*major[[:space:]]*\])|^[^[:space:]]+(\([^)]+\))?!:'; then
                bump="major"
              elif printf '%s\n' "${commit_messages}" | grep -Eqi '(^|\n)(feat(\([^)]+\))?:|\[[[:space:]]*minor[[:space:]]*\])'; then
                bump="minor"
              else
                bump="patch"
              fi
            fi

            next_version="$(python3 -c 'import sys; major, minor, patch = map(int, sys.argv[1].split(".")); bump = sys.argv[2]; versions = {"major": (major + 1, 0, 0), "minor": (major, minor + 1, 0), "patch": (major, minor, patch + 1)}; print("{}.{}.{}".format(*versions[bump]))' "${current_version}" "${bump}")"

            python3 -c 'from pathlib import Path; import re, sys; next_version = sys.argv[1]; cargo_toml = Path("Cargo.toml"); text = cargo_toml.read_text(); updated = re.sub(r"(?m)^version = \"[^\"]+\"$", f"version = \"{next_version}\"", text, count=1); assert text != updated, "failed to update Cargo.toml version"; cargo_toml.write_text(updated)' "${next_version}"

            cargo metadata --format-version 1 >/dev/null
            cargo test --quiet

            git fetch origin
            if [[ "$(git rev-parse "origin/${DEFAULT_BRANCH}")" != "${base_sha}" ]]; then
              echo "Default branch advanced during release prep; letting the newer workflow run handle the release."
              echo "release_created=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            git commit -m "chore(release): v${next_version} [skip ci]"
            git push origin "HEAD:${DEFAULT_BRANCH}"

            release_tag="v${next_version}"
          fi

          git tag "${release_tag}"
          git push origin "refs/tags/${release_tag}"
          echo "release_created=true" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${release_tag}" >> "${GITHUB_OUTPUT}"

  publish-assets:
    name: publish release assets
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.release_created == 'true' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.prepare-release.outputs.tag_name }}
    secrets: inherit
