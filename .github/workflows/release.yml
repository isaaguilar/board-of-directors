name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release, for example v0.2.0"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Existing git tag to release, for example v0.2.0"
        required: true
        type: string

env:
  BINARY_NAME: bod
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify release inputs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_TAG:-${REF_NAME}}"
          if [[ -z "${release_tag}" ]]; then
            echo "No release tag was provided." >&2
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Check out release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout --force "refs/tags/${RELEASE_TAG}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Ensure tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          expected_tag="v${manifest_version}"

          if [[ "${RELEASE_TAG}" != "${expected_tag}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match Cargo.toml version ${expected_tag}." >&2
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked --quiet

  build:
    name: build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_TAG:-${REF_NAME}}"
          if [[ -z "${release_tag}" ]]; then
            echo "No release tag was provided." >&2
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Check out release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout --force "refs/tags/${RELEASE_TAG}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --bin "${BINARY_NAME}" --target "${{ matrix.target }}"

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="dist/${BINARY_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "${archive}" "${BINARY_NAME}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Attest archive provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_TAG:-${REF_NAME}}"
          if [[ -z "${release_tag}" ]]; then
            echo "No release tag was provided." >&2
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease_flag=()
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              "${prerelease_flag[@]}" \
              dist/*
          fi
